backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "site_content"
    label: "Website Content"
    files:

      - label: "Site Settings"
        name: "site"
        file: "content.json"
        fields:
          - label: "Site Info"
            name: "site"
            widget: "object"
            fields:
              - { label: "Business Name", name: "name", widget: "string" }
              - { label: "Tagline", name: "tagline", widget: "string" }
              - { label: "Phone Number", name: "phone", widget: "string" }
              - { label: "Email Address", name: "email", widget: "string" }
              - { label: "Address / Location", name: "address", widget: "string" }
              - { label: "Service Area Description", name: "service_area", widget: "string" }
              - { label: "Facebook Page URL", name: "facebook_url", widget: "string" }
              - { label: "Google Maps URL", name: "google_maps_url", widget: "string" }
              - { label: "Google Review Link", name: "google_review_url", widget: "string" }

          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow Text (small text above headline)", name: "eyebrow", widget: "string" }
              - { label: "Main Headline", name: "headline", widget: "string" }
              - { label: "Subheadline / Description", name: "subheadline", widget: "text" }
              - { label: "Primary Button Text", name: "cta_primary", widget: "string" }
              - { label: "Secondary Button Text", name: "cta_secondary", widget: "string" }
              - { label: "Hero Background Photo", name: "background_image", widget: "image", required: false }

          - label: "About Section"
            name: "about"
            widget: "object"
            fields:
              - { label: "Eyebrow Text", name: "eyebrow", widget: "string" }
              - { label: "Headline", name: "headline", widget: "string" }
              - label: "Paragraphs"
                name: "paragraphs"
                widget: "list"
                field: { label: "Paragraph", name: "item", widget: "text" }
              - { label: "Team / Work Photo", name: "photo", widget: "image", required: false }
              - { label: "Badge Text (e.g. Est. 2024)", name: "established", widget: "string" }

          - label: "Services"
            name: "services"
            widget: "list"
            fields:
              - { label: "Icon (emoji)", name: "icon", widget: "string" }
              - { label: "Service Name", name: "name", widget: "string" }
              - { label: "Short Description", name: "desc", widget: "text" }
